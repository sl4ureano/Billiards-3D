<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Billiards 3D</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="table-body">
  <main class="table-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>Billiards 3D</h1>
          <p id="status">Criando sala...</p>
        </div>
      </div>

      <section class="room-panel" aria-label="Sala">
        <div id="qr" class="qr">QR</div>
        <div>
          <span class="label">Codigo</span>
          <strong id="code">----</strong>
          <a id="controlLink" href="#" target="_blank" rel="noopener">controle</a>
        </div>
      </section>
    </header>

    <section class="scorebar">
      <div>
        <span class="label">Vez</span>
        <strong id="turn">Jogador 1</strong>
      </div>
      <div>
        <span class="label">Forca</span>
        <meter id="powerMeter" min="0" max="1" value="0.45"></meter>
      </div>
      <div>
        <span class="label">Jogadores</span>
        <strong id="players">0/2</strong>
      </div>
      <button id="resetBtn" type="button">Reiniciar</button>
      <div id="assignments" class="assignments" aria-label="Placar"></div>
    </section>

    <canvas id="scene"></canvas>
  </main>

  <script type="module" src="/assets/js/host.js"></script>
</body>
</html>
