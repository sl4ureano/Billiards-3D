<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Billiards 3D</title>
  <link rel="stylesheet" href="/assets/css/style.css" />

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
  }
}
</script>

</head>
<body class="table-body">
  <main class="table-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>Billiards 3D</h1>
          <p id="status">Criando sala...</p>
        </div>
      </div>

      <section class="room-panel" aria-label="Sala">
        <div class="room-info room-info-clean">
          <span class="label">Codigo da sala</span>
          <strong id="code">----</strong>
          <div class="room-links" aria-label="Links da sala">
            <a id="controlLink" class="room-action-card" href="#" target="_blank" rel="noopener" aria-label="Abrir controle">
              <span class="room-action-icon">🎮</span>
              <span class="room-action-title">Controle</span>
              <small>Jogar</small>
              <span class="mini-qr" aria-hidden="true"></span>
            </a>
            <a id="playLink" class="room-action-card" href="#" target="_blank" rel="noopener" aria-label="Abrir mesa remota">
              <span class="room-action-icon">🖥️</span>
              <span class="room-action-title">Mesa remota</span>
              <small>Entrar na partida</small>
              <span class="mini-qr" aria-hidden="true"></span>
            </a>
            <a id="spectatorLink" class="room-action-card" href="#" target="_blank" rel="noopener" aria-label="Abrir espectador">
              <span class="room-action-icon">👁️</span>
              <span class="room-action-title">Espectador</span>
              <small>Assistir</small>
              <span class="mini-qr" aria-hidden="true"></span>
            </a>
            <a id="editorLink" class="room-action-card" href="/editor" aria-label="Abrir editor">
              <span class="room-action-icon">✏️</span>
              <span class="room-action-title">Editor</span>
              <small>Editar cena</small>
            </a>
          </div>
        </div>
      </section>
    </header>

    <section class="scorebar">
      <div>
        <span class="label">Vez</span>
        <strong id="turn">Jogador 1</strong>
      </div>
      <div>
        <span class="label">Forca</span>
        <meter id="powerMeter" min="0" max="1" value="0.45"></meter>
      </div>
      <div>
        <span class="label">Modo</span>
        <strong id="aiMode">Contra amigos</strong>
      </div>
      <div>
        <span class="label">Tempo</span>
        <strong id="shotTimer">60s</strong>
      </div>
      <div>
        <span class="label">Jogadores</span>
        <strong id="players">0/2</strong>
      </div>
      <div id="assignments" class="assignments" aria-label="Placar"></div>
    </section>

    <div id="winnerOverlay" class="winner-overlay" aria-hidden="true">
      <div class="winner-card">
        <span class="winner-kicker">Fim de jogo</span>
        <strong id="winnerTitle">Jogador venceu!</strong>
        <p id="winnerReason">Partida encerrada</p>
      </div>
    </div>

    <canvas id="scene"></canvas>
  </main>

  <script type="module" src="/assets/js/host.js"></script>
</body>
</html>
